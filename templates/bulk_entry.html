<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Time Entry</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --success: #10b981;
            --failed: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 15% 0%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 100%, rgba(59, 130, 246, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .glass-header {
            margin-bottom: 2rem;
            animation: fadeDown 0.6s ease-out;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .header-content h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .form-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: fadeUp 0.6s forwards;
            margin-bottom: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.85rem 1rem;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        /* Toast Notifications Layer */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .toast {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideUp 0.3s ease-out forwards;
            min-width: 320px;
        }

        .toast-success {
            border-left: 4px solid var(--success);
        }

        .toast-error {
            border-left: 4px solid var(--failed);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .submit-bar {
            margin-top: 3rem;
            border-top: 1px solid var(--border-color);
            padding-top: 2rem;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="glass-header">
            <div class="header-content">
                <h1>Bulk Automation Entry</h1>
            </div>
            <a href="/" class="btn btn-secondary">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Dashboard
            </a>
        </header>

        <form class="form-card" id="bulk-form">
            <div class="form-grid">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="start-date" required>
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="end-date" required>
                </div>
            </div>

            <div class="submit-bar">
                <button type="submit" class="btn btn-primary" id="save-btn">
                    Run Bulk Automation Filler
                </button>
            </div>
        </form>
    </div>

    <script>
        // Restrict bounds strictly forbidding selections >= today mathematically
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toISOString().split('T')[0];

        const startDateInput = document.getElementById('start-date');
        const endDateInput = document.getElementById('end-date');

        startDateInput.max = yesterdayStr;
        endDateInput.max = yesterdayStr;

        // Default bounds natively to yesterday instead of today to avoid blank failures
        startDateInput.valueAsDate = yesterday;
        endDateInput.valueAsDate = yesterday;

        function showToast(message, isSuccess = true) {
            const container = document.getElementById('toast-container') || createToastContainer();
            const toast = document.createElement('div');
            toast.className = `toast ${isSuccess ? 'toast-success' : 'toast-error'}`;
            toast.innerHTML = `
                ${isSuccess ? '✅' : '❌'}
                <div style="flex:1;">
                    <div style="font-weight: 600; font-size: 0.95rem;">${isSuccess ? 'Success' : 'Action Failed'}</div>
                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.2rem;">${message}</div>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideUp 0.3s ease-out reverse backwards';
                setTimeout(() => toast.remove(), 300);
            }, 5500);
        }

        function createToastContainer() {
            const cont = document.createElement('div');
            cont.id = 'toast-container';
            cont.className = 'toast-container';
            document.body.appendChild(cont);
            return cont;
        }

        document.getElementById('bulk-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const payload = {
                start_date: document.getElementById('start-date').value,
                end_date: document.getElementById('end-date').value
            };

            // Force local timezone bounding manually avoiding strict UTC conversion overlaps
            const parsedStart = new Date(payload.start_date + 'T00:00:00');
            const parsedEnd = new Date(payload.end_date + 'T00:00:00');
            const targetToday = new Date();
            targetToday.setHours(0,0,0,0);

            if (parsedEnd < parsedStart) {
                return showToast("End Date cannot be earlier than Start Date.", false);
            }
            if (parsedStart >= targetToday || parsedEnd >= targetToday) {
                return showToast("Dates must be explicitly before today.", false);
            }

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = "Processing Array...";

            try {
                const response = await fetch('/api/bulk-entry', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (data.success) {
                    showToast(data.message, true);
                    btn.innerHTML = "Bulk Automation Complete!";
                    btn.style.background = "var(--success)";
                    setTimeout(() => window.location.href = "/", 2000);
                } else {
                    showToast(data.message || "Failed to process bulk entries.", false);
                    btn.disabled = false;
                    btn.innerHTML = "Run Bulk Automation Filler";
                }
            } catch (err) {
                showToast("Network completely failed to reach API.", false);
                btn.disabled = false;
                btn.innerHTML = "Run Bulk Automation Filler";
            }
        });
    </script>
</body>

</html>
